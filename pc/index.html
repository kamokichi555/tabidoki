<!DOCTYPE html>
<!--
  旅刻 PC版 — 編集・俯瞰デスク（本番配置版：共有コア import）
  ・データ層は ../js/00-constants.js, ../js/02-utils.js を import して共有
    → _migrateData / _sanitizeImportedData / parseCoord 等をモバイル版と同一ロジックで実行
    → JSON互換が自動で保証される（PCで作った行程をモバイルでそのまま開ける）
  ・地図：地理院タイル（標準/淡色/写真）  出典 © 国土地理院
  ※ ESMの import を使うため file:// では動きません。GitHub Pages配信、または
     リポジトリ直下で `python3 -m http.server` 等で配信し /pc/ を開いてください。
  Copyright © 鴨吉 All Rights Reserved.
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅刻 PC — 編集・俯瞰デスク</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Boku&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1110;--bg2:#1C1F1C;--bg3:#2A2F2A;
  --text:#F2F2E6;--text2:#B8BCA8;--text3:#8A9082;
  --border:rgba(199,194,154,.16);--border2:rgba(199,194,154,.34);
  --amber:#C7A24A;--amber-bg:rgba(199,162,74,.12);
  --green:#A6C06E;--red:#E07A3F;--r:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'BIZ UDPGothic',-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
header{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:#141714;border-bottom:1px solid var(--border)}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-logo{font-family:'Yuji Boku','Hiragino Mincho ProN',serif;font-size:22px;letter-spacing:.12em;color:#EBE6D7}
.hd-badge{font-size:11px;color:var(--text3);letter-spacing:.18em;border:1px solid var(--border2);padding:1px 7px;border-radius:5px}
.hd-title{font-size:13px;color:var(--text2);max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hd-right{display:flex;align-items:center;gap:6px}
.hd-right button{font-size:17px;color:var(--text2);padding:6px 9px;border-radius:var(--r)}
.hd-right button:hover{background:var(--bg3)}
#desk{display:grid;grid-template-columns:380px 1fr;grid-template-rows:minmax(0,1fr);height:calc(100% - 48px);overflow:hidden}
#pane-list{border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.day-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:9px 10px;border-bottom:1px solid var(--border)}
.day-tab{position:relative;font-size:12px;padding:4px 13px;border-radius:6px;color:var(--text3);border:1px solid transparent;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.25}
.day-tab.on{background:var(--amber);color:#1A1A12}
.day-tab:not(.on){border-color:var(--border)}
.day-tab:not(.on):hover{background:var(--bg2)}
.dt-sub{font-size:10px;opacity:.78;letter-spacing:.02em}
.day-tab .dt-sat{color:#6E9CC0}
.day-tab .dt-sun{color:var(--red)}
.day-tab.on .dt-sub,.day-tab.on .dt-sat,.day-tab.on .dt-sun{color:#1A1A12;opacity:.72}
/* アクティブ日タブの右上に出る「この日程を削除」✕（モバイルの「現在日を削除」と同じ意味） */
.day-tab.on{padding-right:21px}
.dt-del{position:absolute;top:1px;right:2px;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1;border-radius:4px;color:#1A1A12;opacity:.5}
.dt-del:hover{opacity:1;background:rgba(0,0,0,.2)}
#stop-list{flex:1;min-height:0;overflow-y:auto;padding:6px 6px 12px}
.stop-row{border-radius:var(--r);border:1px solid transparent}
.sr-head{display:flex;align-items:center;gap:9px;padding:9px;cursor:pointer}
.sr-edit{padding:2px 11px 12px;display:flex;flex-direction:column;gap:12px}
.sr-toggle{color:var(--text3);font-size:13px;flex:none;padding:0 4px;border-radius:5px}
.sr-toggle:hover{background:var(--bg3);color:var(--text2)}
.stop-row.expanded .stop-grip{visibility:hidden}
.stop-row:hover{background:var(--bg2)}
.stop-row.sel{background:var(--amber-bg);border-color:rgba(199,162,74,.5)}
.stop-grip{color:#5A5F55;font-size:13px;cursor:grab;user-select:none;letter-spacing:-2px}
.stop-row.dragging{opacity:.4}
.stop-row.drop-before{box-shadow:inset 0 2px 0 0 var(--amber)}
.stop-row.drop-after{box-shadow:inset 0 -2px 0 0 var(--amber)}
.stop-num{width:22px;height:22px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--bg3);color:var(--text2);border:1.5px solid var(--text3)}
.stop-row.sel .stop-num{background:var(--amber);color:#1A1A12;border-color:#F2E6C2}
.stop-num.nogeo{border-style:dashed;color:var(--text3)}
.stop-main{flex:1;min-width:0}
.stop-name{font-size:14px;color:#EBE6D7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stop-row.sel .stop-name{color:var(--text)}
.stop-time{font-size:11px;color:var(--text3)}
.stop-row.sel .stop-time{color:var(--amber)}
/* 地点間の移動時間（モバイル版 .move-dur-label と同デザイン：中央ラベル＋左右ハーフライン、距離で色分け） */
.move-dur-label{display:flex;align-items:center;gap:8px;margin:5px 9px;font-size:11.5px;font-weight:700;letter-spacing:.02em;color:#C7C29A}
.move-dur-label::before,.move-dur-label::after{content:'';flex:1;height:1px;background:var(--border)}
.move-dur-label.lv1{color:var(--amber)}
.move-dur-label.lv2{color:var(--red);animation:blink 1s ease-in-out infinite}
/* 地図：区間ラベル（中点に 移動時間・直線距離。色分けはリストと共通 lv1=amber/lv2=red） */
.seg-label{display:inline-block;white-space:nowrap;transform:translate(-50%,-50%);font-size:10.5px;font-weight:700;letter-spacing:.02em;color:#D8D3AB;background:rgba(20,23,20,.94);border:1px solid var(--border2);padding:3px 9px;border-radius:7px;box-shadow:0 3px 9px rgba(0,0,0,.55);pointer-events:none}
.seg-label .sl-km{color:var(--text3);font-weight:400}
.seg-label.lv1{color:var(--amber)}
.seg-label.lv2{color:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.stop-fuel{font-size:11px;color:var(--amber);flex:none}
.stop-tag-nogeo{font-size:10px;color:var(--text3);border:1px solid var(--border2);border-radius:4px;padding:0 5px;flex:none}
#list-summary{display:none;align-items:center;gap:8px;margin:6px 8px 0;padding:8px 11px;background:rgba(224,122,63,.15);border:1px solid rgba(224,122,63,.42);border-radius:7px}
#list-summary .sum-warn{font-size:12px;color:#F0C9A0;flex:1}
.sum-btn{background:var(--amber);color:#1A1A12;font-size:12px;font-weight:700;border:none;padding:5px 13px;border-radius:6px;cursor:pointer;white-space:nowrap}
.sum-btn:hover{filter:brightness(1.08)}.sum-btn:disabled{opacity:.6;cursor:default}
.row-fill{display:flex;align-items:center;gap:3px;background:rgba(199,162,74,.16);color:#E6D9B0;border:1px solid rgba(199,162,74,.5);font-size:11px;padding:3px 9px;border-radius:6px;flex:none;cursor:pointer}
.row-fill:hover{background:rgba(199,162,74,.3)}.row-fill:disabled{opacity:.6;cursor:default}
.add-stop{flex:none;margin:8px 10px;padding:8px;border:1px dashed var(--border2);border-radius:var(--r);width:calc(100% - 20px);color:var(--text3);font-size:12px}
.add-stop:hover{background:var(--bg2);color:var(--text2)}
#pane-map{position:relative;min-width:0}
#map{position:absolute;inset:0;background:#1A1D1A}
.map-overlay{position:absolute;z-index:1000;font-size:11px}
.map-info{top:10px;left:10px;background:rgba(20,23,20,.85);border:1px solid var(--border2);color:var(--text2);padding:4px 10px;border-radius:6px}
.map-layers{top:10px;right:10px;display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.map-layers button{font-size:11px;padding:4px 10px;background:rgba(20,23,20,.85);color:var(--text3)}
.map-layers button.on{background:var(--amber);color:#1A1A12}
.map-warn{bottom:10px;left:10px;right:10px;background:rgba(224,122,63,.14);border:1px solid rgba(224,122,63,.5);color:#F0B89A;padding:4px 10px;border-radius:6px;display:none;align-items:center}
.stop-tag-warn{font-size:10px;color:#E0A23F;border:1px solid rgba(224,162,63,.5);border-radius:4px;padding:0 5px;flex:none}
.fld label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px}
.fld input,.fld textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:14px;padding:7px 10px;outline:none}
.fld input:focus,.fld textarea:focus{border-color:var(--amber)}
.fld .hint{font-size:10px;color:var(--text3);margin-top:3px}
.fld .hint.ok{color:var(--green)}.fld .hint.warn{color:var(--red)}
.fld-row{display:flex;gap:8px}.fld-row .fld{flex:1}
.fld input[type=time]{text-align:center}
.fld textarea{resize:none;min-height:64px;line-height:1.6;overflow:hidden}
.edit-actions{display:flex;gap:8px;margin-top:2px}
.btn-save{flex:1;background:var(--amber);color:#1A1A12;font-size:13px;font-weight:700;padding:9px;border-radius:var(--r)}
.btn-save:hover{filter:brightness(1.08)}
.btn-del{background:var(--bg2);border:1px solid var(--border);color:var(--red);font-size:14px;padding:9px 13px;border-radius:var(--r)}
.btn-del:hover{background:var(--bg3)}
.leaflet-container{font-family:inherit}
.leaflet-control-attribution{background:rgba(20,23,20,.8)!important;color:var(--text3)!important;font-size:10px!important}
.leaflet-control-attribution a{color:var(--text2)!important}
.leaflet-control-zoom a{background:rgba(20,23,20,.9)!important;color:var(--text2)!important;border-color:var(--border2)!important}
.leaflet-control-zoom a:hover{background:var(--bg3)!important}
.pin{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'BIZ UDPGothic',sans-serif;background:#2A2F2A;color:#EBE6D7;border:2px solid #8A9082;box-shadow:0 1px 4px rgba(0,0,0,.6)}
.pin.sel{background:#C7A24A;color:#1A1A12;border-color:#F2E6C2;width:32px;height:32px;font-size:15px}
.pin.lowconf{border-style:dashed;border-color:#E0A23F}
@media (max-width:1100px){#desk{grid-template-columns:320px 1fr}}
</style>
</head>
<body>
<header>
  <div class="hd-left">
    <span class="hd-logo">旅刻</span>
    <span class="hd-badge">PC / DESK</span>
    <span class="hd-title" id="hd-title">—</span>
  </div>
  <div class="hd-right">
    <button title="保存（JSON）" id="btn-save">💾</button>
    <button title="読込（JSON）" id="btn-load">📂</button>
    <button title="共有" id="btn-share">📋</button>
    <button title="設定">⚙️</button>
  </div>
</header>
<input type="file" id="file-in" accept=".json,application/json" style="display:none">
<div id="desk">
  <div id="pane-list">
    <div class="day-tabs" id="day-tabs"></div>
    <div id="list-summary"></div>
    <div id="stop-list"></div>
    <button class="add-stop">＋ 地点を追加</button>
  </div>
  <div id="pane-map">
    <div id="map"></div>
    <div class="map-overlay map-info" id="map-info">—</div>
    <div class="map-overlay map-layers">
      <button class="on" data-layer="std">標準</button>
      <button data-layer="pale">淡色</button>
      <button data-layer="photo">写真</button>
    </div>
    <div class="map-overlay map-warn" id="map-warn"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module">
/* ── 共有コアを import（モバイル版と同一ロジック） ──
   ※ 02-utils.js は weather 非依存の純粋コアにリファクタ済み。00-constants と 02-utils だけを読む。 */
import { DEFAULT, SK, WX_GEOCODE_INTERVAL_MS, LIMIT } from '../js/00-constants.js';
import { _migrateData, _sanitizeImportedData, parseCoord, hasGeo, stayDur, moveDur, moveDurLevel, esc, buildGeoTargets, geoMatchLevel, _newStopId } from '../js/02-utils.js';
import { _geocodeGSI, _geoCacheGet, _geoCacheSet } from '../js/_geo.js';

/* サンプル（mk8-v1 形式 → _migrateData で最新スキーマへ移行されることも実演） */
const _SAMPLE_DATA={
  "version":"mk8-v1","title":"神奈川〜山梨 日帰りツーリング","currentStopId":null,
  "days":[{"label":"1日目\n神奈川→山梨","date":"2026-06-13","routeUrl":"","stops":[
    {"id":"s001","name":"横浜 出発","addr":"神奈川県横浜市西区","arr":"","dep":"08:00","note":"早めに出発。下道で","fuel":false},
    {"id":"s002","name":"宮ヶ瀬湖","addr":"35.5298, 139.2297","arr":"09:30","dep":"10:00","note":"湖畔で休憩","fuel":false},
    {"id":"s003","name":"道志みち（国道413号）","addr":"35.5035, 139.1120","arr":"10:30","dep":"10:35","note":"ワインディングを満喫","fuel":false},
    {"id":"s004","name":"道の駅 どうし","addr":"35.5035, 138.9899","arr":"11:15","dep":"12:15","note":"鹿カレーや地元野菜","fuel":false},
    {"id":"s005","name":"山中湖","addr":"35.4186, 138.8775","arr":"12:50","dep":"13:30","note":"富士山の眺望ポイント","fuel":false},
    {"id":"s006","name":"富士山パノラマロープウェイ","addr":"35.5038, 138.7744","arr":"14:00","dep":"14:30","note":"河口湖周辺","fuel":false},
    {"id":"s007","name":"道の駅 なるさわ","addr":"35.4779, 138.6922","arr":"15:00","dep":"15:30","note":"ここで給油チェック","fuel":true},
    {"id":"s008","name":"横浜 帰着","addr":"35.4660, 139.6221","arr":"18:00","dep":"","note":"中央道・相模原IC経由","fuel":false}
  ]}]
};

let data, curDay=0, selId=null, geoConf={}; // geoConf: id→'partial'/'mismatch'（補完後の要確認マーク）
let freshAddId=null;                        // 追加直後・未保存の地点ID（保存せず離脱したら破棄＝モバイルの「保存で確定」に合わせる）
const stopsOf=()=>data.days[curDay]?.stops||[];
const coordOf=s=>hasGeo(s)?{lat:s.geo.lat,lon:s.geo.lon}:parseCoord(s.addr); // 取込後はsanitizeがgeoを確定済み

/* 取り込み共通：移行→サニタイズ（geoのバックフィルもここで実行される） */
function loadData(p){ _migrateData(p); _sanitizeImportedData(p); data=p; curDay=0; selId=null; geoConf={}; freshAddId=null; render(); }

/* ── 永続化：編集を localStorage 'touring_data'（SK）へ書き戻す ──
   モバイル版 03-storage.save() と同一キー・同一形式（JSON.stringify(data)）。
   save() を直接 import しない理由：03-storage は 04-weather（DOM/タイマ依存）を芋づるで引き込み、
   PC版が意図的に切り離した依存グラフを復活させてしまうため。ここは同形式の最小実装に留める。
   data をまるごと保存するので、PC編集パネルが触らない log/actArr/actDep 等モバイル専用項目も round-trip で温存される。
   ※世代バックアップ(LSK.backup)はモバイル側に委ねる（同一オリジン・同一キーを共有するため保護は効く）。 */
function persist(){
  try{
    data.version=DEFAULT.version;        // モバイルの読み込み(_migrateData)と整合
    localStorage.setItem(SK,JSON.stringify(data));
  }catch(e){
    alert('保存に失敗しました。ブラウザのストレージ容量が不足している可能性があります。\n'+((e&&e.message)||e));
  }
}

/* ── 地図：地理院タイル ── */
const GSI_ATTR='地図：<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">国土地理院（地理院タイル）</a>';
const layers={
  std:  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',{attribution:GSI_ATTR,maxZoom:18}),
  pale: L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',{attribution:GSI_ATTR,maxZoom:18}),
  photo:L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',{attribution:GSI_ATTR,maxZoom:18}),
};
const map=L.map('map',{zoomControl:true,layers:[layers.std]}).setView([35.5,139.0],10);
let curLayer='std';
/* 背景特性に合わせたルート/区間ラベルの線色。タイルは別オリジンでcanvas画素を読めないため、
   各地図の典型的な配色から「最も視認しやすい色」を決め打ちで割り当てる。
   std=色数の多い明地図→マゼンタ / pale=ほぼ白→濃ブルー / photo=航空写真(暗・緑茶)→ビビッド黄 */
function routeColorsFor(k){return ({
  std:  {line:'#E5007E',dotStroke:'#3A0020',cas:'rgba(15,17,16,.55)'},
  pale: {line:'#1438C8',dotStroke:'#0A1A55',cas:'rgba(15,17,16,.5)'},
  photo:{line:'#FFD60A',dotStroke:'#3A2E00',cas:'rgba(255,255,255,.65)'},
})[k]||{line:'#C7A24A',dotStroke:'#1A1A12',cas:'rgba(15,17,16,.5)'};}
let routeColors=routeColorsFor(curLayer);
document.querySelectorAll('.map-layers button').forEach(b=>{b.onclick=()=>{const k=b.dataset.layer;if(k===curLayer)return;map.removeLayer(layers[curLayer]);map.addLayer(layers[k]);curLayer=k;routeColors=routeColorsFor(k);if(routeCas)routeCas.setStyle({color:routeColors.cas});if(route)route.setStyle({color:routeColors.line});layoutSegLabels();document.querySelectorAll('.map-layers button').forEach(x=>x.classList.toggle('on',x===b));};});

let markers={}, route=null, routeCas=null, pinLeaders=[], segLabels=[], segLines=[], segPlotted=[], segMeta=[];
function pinIcon(n,sel,lc){return L.divIcon({className:'',html:`<div class="pin${sel?' sel':''}${lc?' lowconf':''}">${n}</div>`,iconSize:sel?[32,32]:[26,26],iconAnchor:sel?[16,16]:[13,13]});}
/* 2点間の直線距離(km)：ハバサイン式 */
function segKm(a,b){const R=6371,r=d=>d*Math.PI/180;const dLa=r(b.lat-a.lat),dLo=r(b.lon-a.lon);const h=Math.sin(dLa/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function fmtKm(km){return km>=10?Math.round(km)+'km':km>=1?km.toFixed(1)+'km':Math.round(km*1000)+'m';}
/* 区間ラベル（中点）：移動時間はリストと同じ moveDur/Level を使用。距離は直線。lv1/2 で色分け */
function segLabelIcon(html,lv){return L.divIcon({className:'',html:`<div class="seg-label${lv>=1?' lv'+lv:''}">${html}</div>`,iconSize:[0,0],iconAnchor:[0,0]});}
/* 進行方向の矢じり（区間中点・a→bの画面角度で回転）。色はルート色に追従。区間ラベルのリーダー接続点も兼ねる。 */
function dirArrowIcon(deg){return L.divIcon({className:'',iconSize:[16,16],iconAnchor:[8,8],
  html:`<div style="width:16px;height:16px;transform:rotate(${deg}deg);transform-origin:50% 50%"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M5,4 L14,8 L5,12 Z" fill="${routeColors.line}" stroke="${routeColors.dotStroke}" stroke-width="1.3" stroke-linejoin="round"/></svg></div>`});}
/* ── 区間ラベルの配置：ピクセル空間で「ルート線・ピン・ラベル同士」に重ならない位置まで退避 ──
   ・各ラベルは中点のすぐ脇から出発し、被る分だけ外へ押し出す（退避量はラベルごとに自動）
   ・引き出し線＋進行方向の矢じりで、どの区間のラベルか保持
   ・ズーム/パンでピクセル関係が変わるため moveend/zoomend で再実行 */
const _segCtx=document.createElement('canvas').getContext('2d');
function layoutSegLabels(){
  segLabels.forEach(m=>map.removeLayer(m));segLabels=[];
  segLines.forEach(m=>map.removeLayer(m));segLines=[];
  if(segPlotted.length<2)return;
  const PAD=7, LINEPAD=5, EDGE=4, START=10, ITERS=300;
  const sz=map.getSize(), BW=sz.x, BH=sz.y;
  const px=segPlotted.map(p=>map.latLngToContainerPoint([p.lat,p.lon]));
  _segCtx.font="700 10.5px 'BIZ UDPGothic',sans-serif";
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  const closest=(P,A,B)=>{const vx=B.x-A.x,vy=B.y-A.y;let t=((P.x-A.x)*vx+(P.y-A.y)*vy)/((vx*vx+vy*vy)||1);t=clamp(t,0,1);return{x:A.x+t*vx,y:A.y+t*vy};};
  /* ルート全体の重心。各区間の法線は「重心から離れる向き＝外側」を必ず採用 */
  let Cx=0,Cy=0; px.forEach(p=>{Cx+=p.x;Cy+=p.y;}); Cx/=px.length; Cy/=px.length;
  const labels=[];
  for(let k=0;k<px.length-1;k++){
    const a=px[k],b=px[k+1], mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    let dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1, nx=-dy/len,ny=dx/len;
    const dot=nx*(mx-Cx)+ny*(my-Cy);                 // >0 なら外向き
    if(dot<0 || (dot===0 && ny>0)){nx=-nx;ny=-ny;}    // 内向きは反転（退化時は上向き）
    const meta=segMeta[k], w=Math.ceil(_segCtx.measureText(meta.plain).width)+22, h=22;
    labels.push({mx,my,ox:nx,oy:ny,x:mx+nx*START,y:my+ny*START,w,h,meta,deg:Math.atan2(dy,dx)*180/Math.PI});
  }
  const pins=px.map(p=>({x:p.x,y:p.y,w:30,h:30,fixed:true}));
  const items=[...labels,...pins];
  const segs=[];for(let k=0;k<px.length-1;k++)segs.push([px[k],px[k+1]]);
  for(let it=0;it<ITERS;it++){
    let moved=false;
    /* ① ルート線から退避（最近区間に対し、その向きでボックスがクリアするまで） */
    for(const Lb of labels){
      let best=null,bd=Infinity;
      for(const[A,B]of segs){const c=closest(Lb,A,B);const dd=(Lb.x-c.x)**2+(Lb.y-c.y)**2;if(dd<bd){bd=dd;best=c;}}
      let dx=Lb.x-best.x,dy=Lb.y-best.y,dist=Math.hypot(dx,dy); if(dist<1e-6){dx=Lb.ox;dy=Lb.oy;dist=1;}
      const ux=dx/dist,uy=dy/dist, need=Math.abs(Lb.w/2*ux)+Math.abs(Lb.h/2*uy)+LINEPAD;
      if(dist<need){Lb.x+=ux*(need-dist);Lb.y+=uy*(need-dist);moved=true;}
    }
    /* ② ラベル同士＋ピンの分離 */
    for(let i=0;i<items.length;i++)for(let j=i+1;j<items.length;j++){
      const A=items[i],B=items[j]; if(A.fixed&&B.fixed)continue;
      const ox=(A.w+B.w)/2+PAD-Math.abs(A.x-B.x), oy=(A.h+B.h)/2+PAD-Math.abs(A.y-B.y);
      if(ox>0&&oy>0){
        const useX=ox<oy,amt=useX?ox:oy,wA=A.fixed?0:(B.fixed?1:.5),wB=B.fixed?0:(A.fixed?1:.5);
        if(useX){const d=A.x<=B.x?-1:1;A.x+=d*amt*wA;B.x-=d*amt*wB;}
        else    {const d=A.y<=B.y?-1:1;A.y+=d*amt*wA;B.y-=d*amt*wB;}
        moved=true;
      }
    }
    for(const Lb of labels){Lb.x=clamp(Lb.x,Lb.w/2+EDGE,BW-Lb.w/2-EDGE);Lb.y=clamp(Lb.y,Lb.h/2+EDGE,BH-Lb.h/2-EDGE);}
    /* ③ 必ず外側：自区間の中点から外向き法線方向に、線をクリアする量まで引き戻す（最後に実施して内側回り込みを禁止） */
    for(const Lb of labels){
      const signed=(Lb.x-Lb.mx)*Lb.ox+(Lb.y-Lb.my)*Lb.oy;
      const need=Math.abs(Lb.w/2*Lb.ox)+Math.abs(Lb.h/2*Lb.oy)+LINEPAD;
      if(signed<need){const d=need-signed; Lb.x+=Lb.ox*d; Lb.y+=Lb.oy*d; moved=true;}
    }
    if(!moved)break;
  }
  /* 描画：引き出し線 → 進行方向の矢じり → ラベル */
  for(const Lb of labels){
    const midLL=map.containerPointToLatLng([Lb.mx,Lb.my]), labLL=map.containerPointToLatLng([Lb.x,Lb.y]);
    segLines.push(L.polyline([midLL,labLL],{color:routeColors.line,weight:1,opacity:.55,interactive:false}).addTo(map));
    segLabels.push(L.marker(midLL,{icon:dirArrowIcon(Lb.deg),interactive:false,keyboard:false,zIndexOffset:-100}).addTo(map));
    segLabels.push(L.marker(labLL,{icon:segLabelIcon(Lb.meta.html,Lb.meta.lv),interactive:false,keyboard:false}).addTo(map));
  }
}
/* ── 案A：重なるピンのファンアウト（ピクセル空間で重なり検出→本来位置を中心に扇状へ退避） ──
   ・各マーカーは true座標を m._anchor に保持。重なる群れだけ円周上にずらし、本来位置へ引き出し線＋金ドット。
   ・ズームで自然に離れれば群れが解けて元位置に戻る（moveend/zoomendで再計算）。
   ・「始点＝終点」など完全同座標(距離0)でも全ピンが見えて個別クリック可能になる。 */
function declutterPins(){
  pinLeaders.forEach(l=>map.removeLayer(l)); pinLeaders=[];
  const arr=[];
  stopsOf().forEach((s)=>{const m=markers[s.id]; if(!m||!m._anchor)return; arr.push({i:m._idx,m,ll:m._anchor,px:map.latLngToContainerPoint(m._anchor)});});
  if(!arr.length)return;
  const TH=22, used=new Array(arr.length).fill(false), groups=[];
  for(let a=0;a<arr.length;a++){
    if(used[a])continue;
    const g=[arr[a]]; used[a]=true;
    let grew=true;
    while(grew){                                       // 仲間が増えなくなるまで繰り返す（鎖状の近接も取りこぼさない）
      grew=false;
      for(let b=0;b<arr.length;b++){
        if(used[b])continue;
        if(g.some(x=>Math.hypot(x.px.x-arr[b].px.x,x.px.y-arr[b].px.y)<TH)){g.push(arr[b]);used[b]=true;grew=true;}
      }
    }
    groups.push(g);
  }
  for(const g of groups){
    if(g.length<2){g[0].m.setLatLng(g[0].ll);continue;} // 単独：本来位置へ
    g.sort((p,q)=>p.i-q.i);                              // 番号順に円周配置
    let cx=0,cy=0; g.forEach(x=>{cx+=x.px.x;cy+=x.px.y;}); cx/=g.length; cy/=g.length;
    const R=Math.max(16,Math.ceil(g.length*5));
    g.forEach((x,k)=>{
      const ang=-Math.PI/2 + k*2*Math.PI/g.length;       // 上始まりで等間隔
      const offLL=map.containerPointToLatLng([cx+R*Math.cos(ang), cy+R*Math.sin(ang)]);
      x.m.setLatLng(offLL);
      pinLeaders.push(L.polyline([x.ll,offLL],{color:'#8A9082',weight:1.4,opacity:.85,interactive:false}).addTo(map));
      pinLeaders.push(L.circleMarker(x.ll,{radius:3,color:'#1A1A12',weight:1.1,fillColor:'#C7A24A',fillOpacity:1,interactive:false}).addTo(map));
    });
  }
}
map.on('moveend zoomend',()=>{declutterPins();layoutSegLabels();});
function rebuildMap(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  if(route){map.removeLayer(route);route=null;}
  if(routeCas){map.removeLayer(routeCas);routeCas=null;}
  const line=[],plotted=[];let nogeo=0;
  stopsOf().forEach((s,i)=>{
    const c=coordOf(s); if(!c){nogeo++;return;}
    line.push([c.lat,c.lon]);
    plotted.push({lat:c.lat,lon:c.lon,stop:s});
    const m=L.marker([c.lat,c.lon],{icon:pinIcon(i+1,s.id===selId,!!geoConf[s.id]),draggable:true}).addTo(map);
    m._anchor=L.latLng(c.lat,c.lon); m._idx=i;                 // 本来位置と番号（declutter用）
    m.on('dragstart',()=>{if(m._anchor)m.setLatLng(m._anchor);}); // 退避中でも本来位置からドラッグ
    m.on('click',()=>select(s.id));
    m.on('dragend',()=>{const p=m.getLatLng();s.geo={lat:+p.lat.toFixed(6),lon:+p.lng.toFixed(6)};s.addr=`${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;delete geoConf[s.id];persist();render();});
    markers[s.id]=m;
  });
  if(line.length>1){
    routeCas=L.polyline(line,{color:routeColors.cas,weight:7,opacity:1,lineCap:'round',lineJoin:'round',interactive:false}).addTo(map); // 縁取り（下）
    route   =L.polyline(line,{color:routeColors.line,weight:4,opacity:.95,lineCap:'round',lineJoin:'round'}).addTo(map);              // 本線（上）
  }
  /* 区間メタ（移動時間・直線距離）はズーム非依存なのでここで確定。配置は layoutSegLabels がピクセル空間で実施 */
  segPlotted=plotted.map(p=>({lat:p.lat,lon:p.lon}));
  segMeta=[];
  for(let k=0;k<plotted.length-1;k++){
    const a=plotted[k],b=plotted[k+1];
    const md=moveDur(a.stop.dep,b.stop.arr), lv=moveDurLevel(a.stop.dep,b.stop.arr), km=fmtKm(segKm(a,b));
    segMeta.push({plain:(md?md+' ・ ':'')+km, html:(md?esc(md)+' ・ ':'')+`<span class="sl-km">${km}</span>`, lv:md?lv:-1});
  }
  if(line.length)map.fitBounds(L.latLngBounds(line),{padding:[46,46],maxZoom:13});
  declutterPins();
  layoutSegLabels();
  document.getElementById('map-info').textContent=`${stopsOf().length}地点 / ${dayLabel(curDay)}`;
  const warn=document.getElementById('map-warn');
  if(nogeo){warn.style.display='flex';warn.innerHTML=`⚠ ${nogeo}件が座標未設定（左の「配置」で地図に追加）`;}
  else warn.style.display='none';
}

function dayLabel(i){const d=data.days[i];const lb=(d.label||'').split('\n')[0];return lb||(d.date||`${i+1}日目`);}
const WD=['日','月','火','水','木','金','土'];
/* date文字列 → Date（YYYY-MM-DD等はローカル日付として解釈し、タイムゾーンずれを防ぐ） */
function parseDate(ds){
  if(!ds)return null;
  const m=String(ds).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  const t=m?new Date(+m[1],+m[2]-1,+m[3]):new Date(ds);
  return isNaN(t)?null:t;
}
/* 「6/14（土）」形式。曜日は土=青/日=赤に色分け */
function dateSubHtml(ds){
  const t=parseDate(ds); if(!t)return '';
  const wd=t.getDay(), cls=wd===0?' dt-sun':wd===6?' dt-sat':'';
  return `<span class="dt-sub${cls}">${t.getMonth()+1}/${t.getDate()}（${WD[wd]}）</span>`;
}
function renderTabs(){
  document.getElementById('day-tabs').innerHTML=data.days.map((d,i)=>`<button class="day-tab${i===curDay?' on':''}" data-day="${i}"><span class="dt-main">${esc(dayLabel(i))}</span>${dateSubHtml(d.date)}${i===curDay?'<span class="dt-del" title="この日程を削除">✕</span>':''}</button>`).join('')+`<button class="day-tab" data-add="1" style="font-size:14px;padding:2px 9px;justify-content:center" title="日程を追加">＋</button>`;
}
function renderList(){
  const ss=stopsOf();
  document.getElementById('stop-list').innerHTML=ss.map((s,i)=>{
    const isSel=s.id===selId;
    const has=!!coordOf(s);
    const fillable=!has&&!!(s.addr||'').trim();
    const dur=stayDur(s.arr,s.dep);
    const t=s.arr&&s.dep?`${s.arr} – ${s.dep} ${dur}`:s.dep?`出発 ${s.dep}`:s.arr?`到着 ${s.arr}`:'';
    const fill=fillable?`<button class="row-fill" data-fill="${s.id}">📍配置</button>`:'';
    const warn=geoConf[s.id]?'<span class="stop-tag-warn">要確認</span>':'';
    /* 選択中＝展開：見出し右端は「配置(座標なし時のみ)＋閉じる✕」。通常行＝配置/座標なしタグ＋要確認 */
    const tail=isSel
      ? `${fill}${warn}<span class="sr-toggle" title="閉じる">✕</span>`
      : `${has?'':(fillable?fill:'<span class="stop-tag-nogeo">座標なし</span>')}${warn}`;
    const isLast=i===ss.length-1;
    const mdur=isLast?'':moveDur(s.dep,ss[i+1].arr);
    const mlv =isLast?-1:moveDurLevel(s.dep,ss[i+1].arr);
    const move=mdur?`<div class="move-dur-label${mlv>=0?' lv'+mlv:''}">→ 次まで ${mdur}</div>`:'';
    const head=`<div class="sr-head">
        <span class="stop-grip">⠿</span><span class="stop-num${has?'':' nogeo'}">${i+1}</span>
        <div class="stop-main"><div class="stop-name">${s.name?esc(s.name):'<span style="color:var(--text3)">（名称未設定）</span>'}</div><div class="stop-time">${esc(t)}</div></div>
        ${s.fuel?'<span class="stop-fuel">⛽</span>':''}${tail}
      </div>`;
    const body=isSel?`<div class="sr-edit">${editFormHtml(s)}</div>`:'';
    return `<div class="stop-row${isSel?' sel expanded':''}" data-id="${s.id}" data-idx="${i}" draggable="${isSel?'false':'true'}">${head}${body}</div>${move}`;
  }).join('');
  if(ss.some(s=>s.id===selId))wireEditForm();
}
/* 左リスト上部の「未配置 N件 ＋ まとめて配置」サマリーバー（案1：操作を問題の隣へ） */
function renderSummary(){
  const el=document.getElementById('list-summary');
  const n=stopsOf().filter(s=>!coordOf(s)&&(s.addr||'').trim()).length;
  if(!n){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.innerHTML=`<span class="sum-warn">⚠ 未配置 ${n}件（住所のみ）</span><button id="sum-fill" class="sum-btn">まとめて配置</button>`;
  document.getElementById('sum-fill').onclick=backfillAll;
}
/* 選択地点のインライン編集フォーム（旧 #pane-edit の中身を左リスト内へ移設）。
   IDは f-name/f-addr/… のまま（同時に開く行は1つだけなので一意）。メモは上限なしオートグロー。 */
function editFormHtml(s){
  const c=coordOf(s);
  return `
    <div class="fld"><label>地点名</label><input id="f-name" value="${esc(s.name)}"></div>
    <div class="fld"><label>📍 住所 / 座標（「緯度, 経度」で地図に反映）</label><input id="f-addr" value="${esc(s.addr||'')}">
      <div class="hint ${c?'ok':'warn'}" id="f-addr-hint">${c?`座標 ${c.lat.toFixed(5)}, ${c.lon.toFixed(5)} → 地図に表示中`:'住所テキスト（座標未確定・地図外）'}</div></div>
    <div class="fld-row"><div class="fld"><label>到着</label><input id="f-arr" type="time" value="${s.arr||''}"></div><div class="fld"><label>出発</label><input id="f-dep" type="time" value="${s.dep||''}"></div></div>
    <div class="fld"><label>メモ</label><textarea id="f-note">${esc(s.note||'')}</textarea></div>
    <div class="fld"><label>給油</label><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)"><input type="checkbox" id="f-fuel" ${s.fuel?'checked':''} style="width:auto"> ⛽ 給油ポイント</label></div>
    <div class="edit-actions"><button class="btn-save" id="f-do-save">保存</button><button class="btn-del" id="f-do-del" title="削除">🗑️</button></div>`;
}
/* renderList が innerHTML を流し込んだ後に呼ぶ：住所ヒント更新・メモのオートグロー・保存/削除を結線 */
function wireEditForm(){
  const addr=document.getElementById('f-addr'); if(!addr)return;
  addr.addEventListener('input',e=>{const cc=parseCoord(e.target.value),h=document.getElementById('f-addr-hint');h.className='hint '+(cc?'ok':'warn');h.textContent=cc?`座標 ${cc.lat.toFixed(5)}, ${cc.lon.toFixed(5)} → 保存で地図に反映`:'住所テキスト（座標未確定・地図外）';});
  const noteEl=document.getElementById('f-note');const growNote=()=>{noteEl.style.height='auto';noteEl.style.height=noteEl.scrollHeight+'px';};growNote();noteEl.addEventListener('input',growNote);
  document.getElementById('f-do-save').onclick=saveStop;
  document.getElementById('f-do-del').onclick=delStop;
}
function render(){renderTabs();renderList();renderSummary();rebuildMap();document.getElementById('hd-title').textContent=data.title||'（無題の行程）';}

function select(id){maybeDiscardFresh(id);selId=id;render();const m=markers[id];if(m)map.panTo(m.getLatLng());}
function switchDay(i){if(i===curDay)return;maybeDiscardFresh();curDay=i;selId=null;render();}

/* ── 日程追加（モバイル 06-day.addDay 準拠。PC版は 06-day を import しない方針のため同一ロジックを最小移植）──
   ・最大7日。前日の日付があれば +1日を自動付与（既存日と重複するなら空）。
   ・前日の最終地点を新日の先頭に引き継ぐ（名前・住所・座標geoのみ。時刻/メモ/実績はリセット）。
     ※geoを落とすと座標文字列の住所を誤ジオコーディングしに行くため、モバイル同様に複製する。
   ・日付が付いたら日付順に整列（_sortDaysPC が現在日をオブジェクト同一性で維持）。 */
function addDay(){
  maybeDiscardFresh();                                       // 編集中の未保存新規地点を破棄（モバイルの編集保護に相当）
  const MAX_DAYS=7;
  if(data.days.length>=MAX_DAYS){alert(`最大${MAX_DAYS}日間までです`);return;}
  const prev=data.days[data.days.length-1];
  let nextDate='';
  if(prev?.date){const _d=new Date(prev.date+'T12:00:00');if(!isNaN(_d.getTime())){_d.setDate(_d.getDate()+1);nextDate=_d.toISOString().slice(0,10);}} // 正午起点でTZ日付ずれを回避
  if(nextDate&&data.days.some(d=>d.date===nextDate))nextDate='';   // 日付重複は空に
  const prevLast=prev?.stops?.length?prev.stops[prev.stops.length-1]:null;
  const inheritStop=prevLast?[{
    id:_newStopId(), name:prevLast.name, addr:prevLast.addr,
    arr:'',dep:'',note:'',log:'',actArr:'',actDep:'',fuel:false,
    geo:prevLast.geo?{lat:prevLast.geo.lat,lon:prevLast.geo.lon}:null,
  }]:[];                                                         // モバイルと同一の生成形
  data.days.push({date:nextDate,routeUrl:'',stops:inheritStop});
  curDay=data.days.length-1;
  if(nextDate)_sortDaysPC();                                     // 日付ありなら整列（現在日は維持）
  selId=null; freshAddId=null;
  persist();render();
}
/* 日付順に整列。空日付は末尾。現在日(curDay)はオブジェクト参照で追従（モバイル _sortDays と同方針）。 */
function _sortDaysPC(){
  const keep=data.days[curDay];
  data.days.sort((a,b)=>{
    if(!a.date&&!b.date)return 0;
    if(!a.date)return 1;
    if(!b.date)return -1;
    return a.date<b.date?-1:a.date>b.date?1:0;
  });
  curDay=data.days.indexOf(keep); if(curDay<0)curDay=0;
}
/* ── 日程削除（モバイル 06-day.deleteCurrentDay 準拠。現在日を削除）──
   ・残り1日のときは「全地点を削除＝全リセット」（日付/ルートURL/ツーリング名も空に）の確認。地点ゼロなら何もしない。
   ・複数日のときは確認のうえ現在日を splice し、現在日を隣（前寄り）へ移す。 */
function deleteDay(){
  maybeDiscardFresh();
  if(data.days.length<=1){
    const day=data.days[0];
    if(!day.stops.length){alert('地点がありません');return;}
    if(!confirm('登録されている地点をすべて削除しますか？'))return;
    day.stops=[]; day.date=''; day.routeUrl=''; delete day.label; data.title=''; // 全リセット（モバイルと同じくツーリング名も空に）
    selId=null; freshAddId=null; geoConf={};
    persist();render();
    return;
  }
  if(!confirm(`「${dayLabel(curDay)}」を削除しますか？`))return;
  data.days.splice(curDay,1);
  curDay=Math.max(0,curDay-1);
  selId=null; freshAddId=null;
  persist();render();
}
function saveStop(){const s=stopsOf().find(x=>x.id===selId);if(!s)return;const _nm=document.getElementById('f-name');if(!(_nm.value||'').trim()){_nm.focus();const eb=document.getElementById('f-do-save');if(eb){eb.textContent='地点名を入力';eb.disabled=true;setTimeout(()=>{eb.textContent='保存';eb.disabled=false;},1300);}return;}s.name=_nm.value;s.addr=document.getElementById('f-addr').value;s.arr=document.getElementById('f-arr').value;s.dep=document.getElementById('f-dep').value;s.note=document.getElementById('f-note').value;s.fuel=document.getElementById('f-fuel').checked;const g=parseCoord(s.addr);s.geo=g||(hasGeo(s)?s.geo:null);freshAddId=null;persist();render();const b=document.getElementById('f-do-save');if(b){const o=b.textContent;b.textContent='保存しました ✓';b.disabled=true;setTimeout(()=>{b.textContent=o;b.disabled=false;},1100);}}
function delStop(){const a=stopsOf();const idx=a.findIndex(x=>x.id===selId);if(idx>=0){a.splice(idx,1);selId=null;freshAddId=null;persist();render();}}
/* ── 地点を追加（モバイル05-stop.jsの追加挙動に合わせる）──
   ・_newStopId()で採番（モバイルと同一）。LIMIT.stopsPerDay(=20)で上限。末尾に追加し自動整列しない（B案）。
   ・PCはインライン編集なので、追加後すぐ選択＝展開してその場で編集。保存するまでは未確定（freshAddId）で、
     保存せず別地点/別日へ移ると破棄＝モバイルで追加フォームを閉じたら何も作られないのと同じ。 */
function addStop(){
  maybeDiscardFresh();                                   // 直前の未保存の新規地点があれば破棄
  const ss=stopsOf();
  if(ss.length>=LIMIT.stopsPerDay){alert(`地点は1日${LIMIT.stopsPerDay}件までです`);return;}
  const id=_newStopId();
  ss.push({id,name:'',addr:'',arr:'',dep:'',note:'',log:'',actArr:'',actDep:'',fuel:false}); // モバイルと同じ生成形
  freshAddId=id; selId=id;                                // 末尾に追加→選択（＝インラインで編集状態）。保存まで永続化しない
  render();
  requestAnimationFrame(()=>{                             // 追加地点へスクロール＋名前欄にフォーカス（モバイルの追加後スクロールに相当）
    const el=document.querySelector(`.stop-row[data-id="${id}"]`);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    const nm=document.getElementById('f-name'); if(nm)nm.focus();
  });
}
/* 未保存の新規地点を破棄（keepId が freshAddId のときは破棄しない）。離脱時に呼ぶ。 */
function maybeDiscardFresh(keepId){
  if(freshAddId==null||freshAddId===keepId)return;
  const a=stopsOf(), i=a.findIndex(x=>x.id===freshAddId);
  if(i>=0){a.splice(i,1);persist();}
  freshAddId=null;
}

/* ── ジオコーディング補完（住所→座標）。共有コア _geo.js / 02-utils を流用 ──
   1件: 住所→クエリ候補(buildGeoTargets)→キャッシュ優先→GSI→geoで確定。
        戻り値は一致度(geoMatchLevel): exact/partial/mismatch/unknown、引けなければ 'fail'。 */
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function backfillGeo(stop){
  const addr=(stop.addr||'').trim();
  if(hasGeo(stop)||parseCoord(addr)) return 'ok'; // 既に座標あり
  if(!addr) return 'fail';                          // 住所すら無い
  for(const q of buildGeoTargets(addr)){
    const cached=_geoCacheGet(q);
    const hit=cached||await _geocodeGSI(q);          // キャッシュ優先→国土地理院
    if(hit){
      if(!cached)_geoCacheSet(q,hit.lat,hit.lon,hit.title); // 天気と共有キャッシュを温める
      stop.geo={lat:hit.lat,lon:hit.lon};            // addrはそのまま、geoに確定
      return geoMatchLevel(addr,hit.title);          // 一致度で「要確認」を判定
    }
  }
  return 'fail';
}
/* 全「座標なし」地点を直列で補完（GSI過負荷を避け、天気と同じ送信間隔で間引く）。 */
async function backfillAll(){
  const btn=document.getElementById('sum-fill');
  const todo=stopsOf().filter(s=>!coordOf(s)&&(s.addr||'').trim());
  if(!todo.length)return;
  let ok=0,warnN=0,fail=0,done=0;
  for(const s of todo){
    if(btn){btn.disabled=true;btn.textContent=`照会中… ${++done}/${todo.length}`;}
    const lv=await backfillGeo(s);
    if(lv==='partial'||lv==='mismatch'){warnN++;geoConf[s.id]=lv;}
    else if(lv==='fail')fail++;
    else ok++; // exact / unknown / ok
    await sleep(WX_GEOCODE_INTERVAL_MS||350);
  }
  persist();render();
  alert(`地図に配置：成功 ${ok}件`+(warnN?` / 要確認 ${warnN}件（地名が住所と掠るだけ。ピンをドラッグで修正可）`:'')+(fail?` / 不可 ${fail}件（住所から座標を特定できず）`:''));
}
/* 1地点だけ補完（行の「配置」ボタン）。完了後その地点を選択して地図を寄せる。 */
async function backfillOne(id,btn){
  maybeDiscardFresh(id);
  const s=stopsOf().find(x=>x.id===id); if(!s)return;
  if(btn){btn.disabled=true;btn.textContent='…';}
  const lv=await backfillGeo(s);
  if(lv==='partial'||lv==='mismatch')geoConf[id]=lv; else delete geoConf[id];
  selId=id; persist();render();
  const m=markers[id]; if(m)map.panTo(m.getLatLng());
  if(lv==='fail')alert('住所から座標を特定できませんでした。座標を手入力するか、地図にピンを置いてください。');
}

/* イベント委譲 */
document.getElementById('day-tabs').onclick=e=>{if(e.target.closest('.dt-del')){deleteDay();return;}const b=e.target.closest('button');if(!b)return;if(b.dataset.add){addDay();return;}switchDay(+b.dataset.day);};
document.getElementById('stop-list').onclick=e=>{
  const fb=e.target.closest('.row-fill');if(fb){e.stopPropagation();backfillOne(fb.dataset.fill,fb);return;}
  if(e.target.closest('.sr-edit'))return;                 // 編集フォーム内のクリックは再描画しない（入力フォーカス維持）
  const head=e.target.closest('.sr-head');if(!head)return;
  const id=head.closest('.stop-row').dataset.id;
  if(id===selId){maybeDiscardFresh();selId=null;render();}    // 展開中の見出しを再クリック→閉じる（新規なら破棄）
  else select(id);
};

/* ── マウスでのドラッグ並べ替え（HTML5 DnD）。配列を入れ替えるだけ（時刻は絶対値のまま据え置き＝旅刻の設計に一致） ── */
let dragId=null;
function moveStop(fromId,toIndex){
  const a=stopsOf();const from=a.findIndex(s=>s.id===fromId);if(from<0)return;
  const [item]=a.splice(from,1);
  if(from<toIndex)toIndex--;                       // 先頭側を抜いた分インデックスを補正
  a.splice(Math.max(0,Math.min(a.length,toIndex)),0,item);
  persist();render();
}
function clearDropMark(){document.querySelectorAll('.stop-row.drop-before,.stop-row.drop-after').forEach(r=>r.classList.remove('drop-before','drop-after'));}
const _isBefore=(row,e)=>{const r=row.getBoundingClientRect();return e.clientY < r.top + r.height/2;};
const SL=document.getElementById('stop-list');
SL.addEventListener('dragstart',e=>{const r=e.target.closest('.stop-row');if(!r)return;dragId=r.dataset.id;e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',dragId);}catch(_){}r.classList.add('dragging');});
SL.addEventListener('dragend',e=>{const r=e.target.closest('.stop-row');if(r)r.classList.remove('dragging');clearDropMark();dragId=null;});
SL.addEventListener('dragover',e=>{if(!dragId)return;e.preventDefault();e.dataTransfer.dropEffect='move';const r=e.target.closest('.stop-row');if(!r||r.dataset.id===dragId){clearDropMark();return;}clearDropMark();r.classList.add(_isBefore(r,e)?'drop-before':'drop-after');});
SL.addEventListener('drop',e=>{if(!dragId)return;e.preventDefault();const r=e.target.closest('.stop-row');const id=dragId;clearDropMark();if(!r||r.dataset.id===id)return;const to=(+r.dataset.idx)+(_isBefore(r,e)?0:1);moveStop(id,to);});
document.querySelector('.add-stop').onclick=addStop;
document.getElementById('btn-load').onclick=()=>document.getElementById('file-in').click();
document.getElementById('btn-save').onclick=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${(data.title||'旅刻行程')}.json`;a.click();URL.revokeObjectURL(a.href);};
document.getElementById('btn-share').onclick=()=>{navigator.clipboard?.writeText(JSON.stringify(data)).then(()=>alert('JSONをクリップボードにコピーしました'),()=>alert('コピーに失敗'));};
document.getElementById('file-in').addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result);if(!p||!Array.isArray(p.days))throw new Error('days配列がありません');loadData(p);}catch(e){alert('読み込み失敗：'+e.message);}};r.readAsText(f);ev.target.value='';});

/* 起動：localStorage 'touring_data'（モバイル版と同一キー・同一オリジンで共有）→ なければサンプル */
let init=null;
try{const raw=localStorage.getItem(SK);const p=raw&&JSON.parse(raw);if(p&&Array.isArray(p.days))init=p;}catch(e){}
loadData(init||structuredClone(_SAMPLE_DATA));

     CACHE_NAME を必ずバンプして旧キャッシュを破棄すること。 */
