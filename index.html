/* ══ オーバーレイ一括掃除 (主要操作前の保険) ══ */
const _OVERLAY_IDS=['share-overlay','splash-settings-overlay','highway-overlay','michi-overlay','gs-overlay'];
/* ── visualViewport オーバーレイ共通ユーティリティ ── */
function _lowerHeaderForOverlay(){
  // overlay表示中はstickyヘッダーがoverlayより前面に来るのを防ぐ
  const h=document.querySelector('header');
  if(h) h.style.zIndex='1';
}
function _makeApplyVp(ov){
  return function(){
    const vv=window.visualViewport;
    if(!vv)return;
    ov.style.top=vv.offsetTop+'px';
    ov.style.left=vv.offsetLeft+'px';
    ov.style.width=vv.width+'px';
    ov.style.height=vv.height+'px';
  };
}
function _bindOverlayVp(ov,applyVp){
  if(!window.visualViewport)return;
  window.visualViewport.addEventListener('resize',applyVp);
  window.visualViewport.addEventListener('scroll',applyVp);
  applyVp();
  ov._applyVp=applyVp; // _closeAllOverlays で unbind するため要素に保存
}
function _unbindOverlayVp(applyVp){
  window.visualViewport?.removeEventListener('resize',applyVp);
  window.visualViewport?.removeEventListener('scroll',applyVp);
}
function _closeOverlay(id){ // 個別overlay閉じる時のvisualViewportリスナーリーク防止
  const el=document.getElementById(id);
  if(!el)return;
  if(el._applyVp) _unbindOverlayVp(el._applyVp);
  el.remove();
  // 全overlay閉じたらヘッダーのz-indexを復元
  if(!_OVERLAY_IDS.some(i=>document.getElementById(i))) document.querySelector('header').style.zIndex='';
}
function _closeAllOverlays(except){
  for(const id of _OVERLAY_IDS){
    if(except===id) continue;
    const el=document.getElementById(id);
    if(!el) continue;
    if(el._applyVp) _unbindOverlayVp(el._applyVp); // visualViewport リスナーリーク防止
    el.remove();
  }
  // overlayが全て閉じたらヘッダーのz-indexを復元
  if(!except||!document.getElementById(except)) document.querySelector('header').style.zIndex='';
}


/* ══ デバッグログ機構 ══ */
const DBG_KEY='dbg_log_v1';
const DBG_ENABLED_KEY='dbg_enabled_v1';
const DBG_MAX=500;
let _dbgEnabled=false;
let _dbgErrCount=0;
let _dbgBuf=[];
let _dbgPersistTimer=null;
let _dbgDirty=false;

function _dbgPersistSchedule(){
  _dbgDirty=true;
  if(_dbgPersistTimer) return;
  _dbgPersistTimer=setTimeout(()=>{
    _dbgPersistTimer=null;
    if(_dbgDirty){
      try{localStorage.setItem(DBG_KEY,JSON.stringify({buf:_dbgBuf,err:_dbgErrCount}));}catch(e){}
      _dbgDirty=false;
    }
  },3000);
}

function _dbgSnapshot(){
  try{
    const h=document.querySelector('header');
    return {
      isEdit:typeof isEdit!=='undefined'?isEdit:null,
      isRide:typeof isRide!=='undefined'?isRide:null,
      cd:typeof currentDay!=='undefined'?currentDay:null,
      mId:typeof manualCurrentId!=='undefined'?manualCurrentId:null,
      aId:typeof activeEditStopId!=='undefined'?activeEditStopId:null,
      eId:typeof editingId!=='undefined'?editingId:null,
      days:(typeof data!=='undefined'&&data?.days)?data.days.length:0,
      hh:h?.offsetHeight||0,
      vw:window.innerWidth,vh:window.innerHeight,
      vvh:window.visualViewport?Math.round(window.visualViewport.height):null,
      vvt:window.visualViewport?Math.round(window.visualViewport.offsetTop):null,
    };
  }catch(e){return {snapErr:String(e).slice(0,60)};}
}

// キーボード挙動デバッグ用の軽量スナップショット
// （_dbgEnabled チェックは呼び出し側で行う）
function _dbgVpSnap(){
  try{
    const vv=window.visualViewport;
    const nv=document.getElementById('normal-view');
    const clk=document.querySelector('.header-clock');
    const hdr=document.querySelector('header');
    const act=document.activeElement;
    const actStr=act?(act.tagName+(act.id?'#'+act.id:act.className?'.'+String(act.className).split(' ')[0]:'')):'-';
    return {
      vvh: vv?Math.round(vv.height):null,          // visual viewport 高さ（キーボードで変化）
      vvt: vv?Math.round(vv.offsetTop):null,        // vp オフセット（iOS shift）
      hh:  hdr?hdr.offsetHeight:0,                  // header 実測高さ
      nvH: nv?parseInt(nv.style.height)||0:0,       // normal-view JS設定高さ
      nvST:nv?Math.round(nv.scrollTop):0,           // normal-view スクロール位置
      sY:  Math.round(window.scrollY||0),           // window スクロール（iOS drift）
      clk: !clk||clk.style.display!=='none',        // 時計表示中か
      act: actStr,                                   // フォーカス中要素
    };
  }catch(e){return {err:1};}
}

function _dbgLog(event,data){
  if(!_dbgEnabled) return;
  try{
    // dataが関数なら有効時のみ評価（早期評価によるDOM計測コストを回避）
    const resolved=typeof data==='function'?data():data;
    const entry={t:new Date().toISOString().slice(11,23),e:event};
    if(resolved!==undefined&&resolved!==null) entry.d=resolved;
    _dbgBuf.push(entry);
    if(_dbgBuf.length>DBG_MAX) _dbgBuf=_dbgBuf.slice(-DBG_MAX);
    _dbgPersistSchedule();
    _dbgRefreshSettings();
  }catch(e){}
}

function _dbgFmtAll(){
  const env={
    app:'tabidoki mk14',
    now:new Date().toISOString(),
    ua:navigator.userAgent,
    vw:window.innerWidth,vh:window.innerHeight,
    vvw:window.visualViewport?.width,vvh:window.visualViewport?.height,
    err:_dbgErrCount,entries:_dbgBuf.length,
    snap:_dbgSnapshot(),
  };
  const head='# 旅刻mk14 デバッグログ\n## 環境\n'+JSON.stringify(env,null,2)+'\n\n## イベント (古い→新しい)\n';
  const lines=_dbgBuf.map(en=>`[${en.t}] ${en.e}${en.d?' '+JSON.stringify(en.d):''}`).join('\n');
  return head+lines+'\n';
}

function _dbgCopy(){
  const t=_dbgFmtAll();
  const done=()=>{try{showInfoToast('📋 ログをコピーしました',1800);}catch(e){}};
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>_dbgFallbackCopy(t,done));
  }else _dbgFallbackCopy(t,done);
}
function _dbgFallbackCopy(t,done){
  try{
    const ta=document.createElement('textarea');
    ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.focus();ta.select();
    document.execCommand('copy');ta.remove();
    done&&done();
  }catch(e){alert('コピーに失敗しました');}
}

function _dbgDownload(){
  try{
    const t=_dbgFmtAll();
    const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='tabidoki-debug-'+new Date().toISOString().slice(0,19).replace(/[:.]/g,'').replace('T','-')+'.txt';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
    try{showInfoToast('💾 ログを保存しました',1800);}catch(e){}
  }catch(e){alert('保存に失敗しました: '+e.message);}
}

function _dbgFetchTest(){

function _dbgClear(){
  if(!confirm('デバッグログをすべて削除しますか？')) return;
  _dbgBuf=[];_dbgErrCount=0;_dbgDirty=true;
  try{localStorage.removeItem(DBG_KEY);}catch(e){}
  _dbgUpdateBadge();
  _dbgRefreshSettings();
  try{showInfoToast('🗑️ ログを消去しました',1500);}catch(e){}
}

function _dbgSetEnabled(on){
  _dbgEnabled=!!on;
  try{localStorage.setItem(DBG_ENABLED_KEY,on?'1':'0');}catch(e){}
  if(on){
    _dbgLog('debug_enabled', _dbgSnapshot);
  }else{
    // OFFにする際は1件記録してから停止
    try{
      _dbgEnabled=true;
      _dbgLog('debug_disabled',null);
      _dbgEnabled=false;
    }catch(e){}
  }
  _dbgUpdateBadge();
  _dbgRefreshSettings();
}

function _dbgUpdateBadge(){
  const b=document.getElementById('dbg-badge');
  const t=document.getElementById('dbg-badge-text');
  if(!b||!t) return;
  if(_dbgEnabled){
    b.classList.add('show');
    if(_dbgErrCount>0){b.classList.add('err');t.textContent='🐛 '+_dbgErrCount;}
    else{b.classList.remove('err');t.textContent='🐛';}
  }else b.classList.remove('show');
}

function _dbgRefreshSettings(){
  const c=document.getElementById('dbg-count');
  if(c) c.textContent=`${_dbgBuf.length}件 / エラー${_dbgErrCount}件`;
}

function _dbgInit(){
  try{_dbgEnabled=localStorage.getItem(DBG_ENABLED_KEY)==='1';}catch(e){}
  try{
    const raw=localStorage.getItem(DBG_KEY);
    if(raw){const obj=JSON.parse(raw);_dbgBuf=Array.isArray(obj?.buf)?obj.buf:[];_dbgErrCount=obj?.err|0;}
  }catch(e){_dbgBuf=[];_dbgErrCount=0;}
  // クリックを全部拾う
  document.addEventListener('click',e=>{
    if(!_dbgEnabled) return;
    if(e.target.closest('#dbg-badge,.dbg-btn,.dbg-section')) return;
    const el=e.target.closest('button,.picker-chip,.day-tab,.stop-row,a[href]');
    if(!el) return;
    try{
      _dbgLog('click',{
        id:el.id||null,
        txt:(el.textContent||'').trim().slice(0,28),
        cls:(typeof el.className==='string'?el.className:'').slice(0,40)||null,
      });
    }catch(e){}
  },true);
  // グローバルエラーハンドラ（showAppError との一本化）
  window.addEventListener('error',e=>{
    _dbgErrCount++;
    _dbgLog('window_error',{
      msg:e.message,
      src:(e.filename||'').slice(-60),
      line:e.lineno,col:e.colno,
      stack:(e.error&&e.error.stack||'').slice(0,400),
    });
    _dbgUpdateBadge();
    showAppError(EC.GLOBAL,e.error||new Error(e.message));
  });
  window.addEventListener('unhandledrejection',e=>{
    _dbgErrCount++;
    _dbgLog('promise_rejection',{reason:String(e.reason).slice(0,400)});
    _dbgUpdateBadge();
    showAppError(EC.GLOBAL,e.reason);
  });
  // showAppError をフック（デバッグログへの記録用）
  try{
    const _orig=showAppError;
    window.showAppError=function(code,err){
      _dbgLog('app_error',{code,err:err instanceof Error?(err.message+' | '+(err.stack||'').slice(0,200)):String(err).slice(0,200)});
      _dbgUpdateBadge();
      return _orig.apply(this,arguments);
    };
  }catch(e){}
  // ページ離脱前に永続化（beforeunload=デスクトップ、pagehide=iOS Safari対応）
  function _dbgFlush(){
    if(_dbgDirty){try{localStorage.setItem(DBG_KEY,JSON.stringify({buf:_dbgBuf,err:_dbgErrCount}));}catch(e){}}
  }
  window.addEventListener('beforeunload',_dbgFlush);
  window.addEventListener('pagehide',_dbgFlush);
  _dbgUpdateBadge();
}
_dbgInit();

_initTheme();

/* ── 施設データマージ共通関数 ── */
function _mergeFacilityData(fallback,online){
  const merged=fallback.slice();
  const existing=new Set(merged.map(m=>m[0]));
  for(const entry of online){
    if(!existing.has(entry[0])) merged.push(entry);
  }
  merged.sort((a,b)=>{const pa=a[1]||'',pb=b[1]||'';return pa<pb?-1:pa>pb?1:0;});
  return merged;
}

function _mergeHighwayData(online){
  HIGHWAY_DATA=_mergeFacilityData(HIGHWAY_FALLBACK,online);
}

/* ── キャッシュ読込: localStorage から {d,t} を取得し validator を通れば返す ──
   戻り値: {data, age, stale} or null。stale=true は maxAgeMs を超えた古いデータ */
function _loadCache(key, maxAgeMs, validate){
  try{
    const cached=localStorage.getItem(key);
    if(!cached) return null;
    const {d,t}=JSON.parse(cached);
    if(validate && !validate(d)) return null;
    const age=Date.now()-t;
    return {data:d, age, stale:age>maxAgeMs};
  }catch(e){return null;}
}

/* ── Overpass API tags → 住所文字列（都道府県+市区町村） ── */
function _extractAddr(tags){
  const addrFull=tags?.['addr:full']||'';
  if(addrFull){
    const m=addrFull.match(/^(.+?[都道府県].+?[市区町村])/);
    if(m) return m[1];
  }
  const pref=tags?.['addr:prefecture']||tags?.['addr:province']||'';
  const city=tags?.['addr:city']||tags?.['addr:town']||tags?.['addr:village']||'';
  return pref?(city?pref+city:pref):'';
}

/* ── Overpass API施設取得（高速SA/PA・道の駅 共通）──
   opts: cacheKey, query, minCount, parseElement(el)→[name,addr]|null,
         onMerge(arr), getLoading, setLoading, refreshUI, errorLabel */
async function _fetchFacility(opts){
  if(opts.getLoading()) return;
  opts.setLoading(true);
  opts.refreshUI();
  let timer;
  try{
    const c=_loadCache(opts.cacheKey, 24*60*60*1000, d=>Array.isArray(d)&&d.length>opts.minCount);
    if(c && !c.stale){opts.onMerge(c.data);return;}
    const ctrl=new AbortController();
    timer=setTimeout(()=>ctrl.abort(),120000);
    const resp=await fetch('https://overpass-api.de/api/interpreter',{
      method:'POST',body:opts.query,signal:ctrl.signal,credentials:'omit'
    });
    clearTimeout(timer);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const json=await resp.json();
    const result=[],seen=new Set();
    for(const el of json.elements){
      const parsed=opts.parseElement(el);
      if(!parsed) continue;
      const [name,addr]=parsed;
      if(!name||seen.has(name)) continue;
      seen.add(name);
      result.push([name,addr]);
    }
    if(result.length>opts.minCount){
      const j=JSON.stringify({d:result,t:Date.now()});
      if(j.length<600000) try{_lsSetItem(opts.cacheKey,j);}catch(e){}
      opts.onMerge(result);
    }
  }catch(e){
    clearTimeout(timer);
    console.log(opts.errorLabel+'オンライン取得失敗（フォールバック使用）:',e?.message);
  }finally{
    opts.setLoading(false);
    opts.refreshUI();
  }
}

/* ── 起動時キャッシュ読込（7日有効・24h超なら裏で更新）── */
function _initFacilityCache(opts){
  const c=_loadCache(opts.cacheKey, 7*24*60*60*1000, d=>Array.isArray(d)&&d.length>opts.minCount);
  if(c && !c.stale){
    opts.onMerge(c.data);
    if(c.age>24*60*60*1000) setTimeout(opts.fetchFn, opts.refreshDelay);
    return;
  }
  setTimeout(opts.fetchFn, opts.refreshDelay);
}

function _fetchHighwayOnline(){
  return _fetchFacility({
    cacheKey:'highway_online_v1', minCount:30, errorLabel:'高速施設',
    query:`[out:json][timeout:100];\nnwr["highway"="services"]["name"~"SA|PA|サービスエリア|パーキングエリア|オアシス|EXPASA|NEOPASA"](24,122,46,155);\nout center tags;`,
    parseElement:el=>{
      const name=(el.tags?.name||'').trim();
      return name?[name,_extractAddr(el.tags)]:null;
    },
    onMerge:_mergeHighwayData,
    getLoading:()=>_highwayLoading,
    setLoading:v=>{_highwayLoading=v;},
    refreshUI:()=>{const s=document.getElementById('highway-search');if(s)filterHighway();},
  });
}

_initFacilityCache({
  cacheKey:'highway_online_v1', minCount:30,
  onMerge:_mergeHighwayData, fetchFn:_fetchHighwayOnline, refreshDelay:6000,
});

  </div>`;
  _lowerHeaderForOverlay();document.body.appendChild(ov);
  const closeBtn=ov.querySelector('#highway-close-btn');
  if(closeBtn) closeBtn.onclick=()=>{_closeOverlay('highway-overlay');requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));};
  _bindOverlayVp(ov,applyVp);
  if(!_highwayLoading) _fetchHighwayOnline();
  const _q=(document.getElementById('inp-name')?.value||'').trim();
  const _s=ov.querySelector('#highway-search');
  if(_s&&_q) _s.value=_q;
  renderHighwayList(_q);

}
function filterHighway(){
  const q=(document.getElementById('highway-search')?.value||'').trim();
  renderHighwayList(q);
}
function renderHighwayList(q){
  const list=document.getElementById('highway-list');
  if(!list) return;
  const filtered=q?HIGHWAY_DATA.filter(m=>m[0].includes(q)||m[1].includes(q)):HIGHWAY_DATA;
  if(!filtered.length){list.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:14px">見つかりません</div>';return;}
  const status=_highwayLoading?'<div style="padding:6px 16px;font-size:11px;color:var(--text3)">🌐 最新データ取得中…</div>':'';
  const footer=`<div style="padding:7px 16px;font-size:11px;color:var(--text3);text-align:right;border-top:1px solid var(--border)">${HIGHWAY_DATA.length}件</div>`;
  list.innerHTML=status+filtered.map(m=>`<div onclick="selectHighway('${escJsAttr(m[0])}','${escJsAttr(m[1])}','${escJsAttr(m[0])}')" style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer">
    <div style="font-weight:700;font-size:15px;color:var(--text)">${esc(m[0])}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(m[1])}</div>
  </div>`).join('')+footer;
}
function selectHighway(name,addr,fullName){
  _dbgLog('selectHighway',{name:String(fullName||name).slice(0,40),addr:String(addr||'').slice(0,40)});
  const ni=document.getElementById('inp-name');
  const ai=document.getElementById('inp-addr');
  if(ni){ni.value=fullName;ni.dispatchEvent(new Event('input',{bubbles:true}));}
  if(ai){ai.value=addr;ai.dispatchEvent(new Event('input',{bubbles:true}));}
  if(addr) _setDetailsOpen(true);
  _closeOverlay('highway-overlay'); // visualViewport リスナーリーク防止
  document.activeElement?.blur(); // キーボードを閉じる
  setTimeout(()=>{
    document.getElementById('normal-view')?.scrollTo({top:0,behavior:'instant'});
  },50);
}

/* ══ 道の駅 動的取得（Overpass API + localStorageキャッシュ） ══ */
let MICHI_NO_EKI = MICHI_NO_EKI_FALLBACK;
let _michiLoading = false;

function _mergeMichiData(online){
  MICHI_NO_EKI=_mergeFacilityData(MICHI_NO_EKI_FALLBACK,online);
}

function _fetchMichiOnline(){
  return _fetchFacility({
    cacheKey:'michi_online_v2', minCount:100, errorLabel:'道の駅一覧',
    query:`[out:json][timeout:100];
nwr["name"~"^道の駅"](24,122,46,155);
out center tags;`,
    parseElement:el=>{
      const fullName=el.tags?.name||'';
      if(!fullName.startsWith('道の駅')) return null;
      const shortName=fullName.replace(/^道の駅[\s　]*/,'').trim();
      return shortName?[shortName,_extractAddr(el.tags)]:null;
    },
    onMerge:_mergeMichiData,
    getLoading:()=>_michiLoading,
    setLoading:v=>{_michiLoading=v;},
    refreshUI:()=>{const s=document.getElementById('michi-search');if(s)filterMichi();},
  });
}

// キャッシュ即時反映 → 古ければ裏で更新
_initFacilityCache({
  cacheKey:'michi_online_v2', minCount:100,
  onMerge:_mergeMichiData, fetchFn:_fetchMichiOnline, refreshDelay:5000,
});

function openMichinoEki(){
  _dbgLog('openMichinoEki',()=>({q:(document.getElementById('inp-name')?.value||'').trim(),snap:_dbgSnapshot()}));
  _closeAllOverlays();
  const ov=document.createElement('div');
  ov.id='michi-overlay';
  const applyVp=_makeApplyVp(ov);

/* ══ ガソリンスタンド選択 ══ */

  ['出光','出光興産系列'],
  ['コスモ石油','コスモエネルギーグループ'],
  ['シェル','昭和シェル石油系列'],
  ['エッソ','エクソンモービル系列'],
  ['モービル','エクソンモービル系列'],
  ['キグナス石油','キグナス石油系列'],
  ['ゼネラル','ゼネラル石油系列'],
  ['ホクレン','北海道農協系列（道内限定）'],

syncBorderAddr();save();
initRideSwipe();
initNormalSwipe();
renderTabs();
updateClock();
render();
// レイアウト確定後にheight計算
requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));
// スプラッシュ画面のエピソード・タイトルを描画
_renderSplash();
// ── キーボード表示対応 ──────────────────────────────
// visualViewport resize: sticky高さ再計算 + edit-area先頭をnormal-view上端に揃える
let _kbResizeTimer=null;
let _kbPrevVvh=null; // キーボード開閉判定用（前回のvvh）
let _kbLastWasClose=false; // 最後のresizeがkb_closeだったか（Android fold 対応）
(window.visualViewport||window).addEventListener('resize',()=>{
  // キーボード開閉判定（デバッグOFF時も必要なため常に計算）
  const _rvVvh=window.visualViewport?window.visualViewport.height:window.innerHeight;
  const _rvDelta=_kbPrevVvh!==null?Math.round(_rvVvh-_kbPrevVvh):null;
  const _rvEv=_rvDelta!==null?(Math.abs(_rvDelta)>80?(_rvDelta<0?'kb_open':'kb_close'):'ui_resize'):null;
  // kb_close のみ true にする。ui_resize では上書きしない（2段階 resize で kb_close が消えるバグ対策）
  if(_rvEv==='kb_close') _kbLastWasClose=true;
  else if(_rvEv==='kb_open') _kbLastWasClose=false;
  _kbPrevVvh=_rvVvh;
  if(_dbgEnabled) _dbgLog('kb:vp_resize',{..._dbgVpSnap(),delta:_rvDelta,ev:_rvEv});
  _updateStickyTops();
  const el=document.activeElement;
  const nv=document.getElementById('normal-view');
  if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')&&!el.closest('[id$="-overlay"]')){
    setTimeout(()=>{
      if(nv){
        const elRect=el.getBoundingClientRect();
        const nvRect=nv.getBoundingClientRect();
        const vvBottom=window.visualViewport?.height??window.innerHeight;
        // フォーカス要素がキーボードに隠れているか、表示領域外の場合のみスクロール
        if(elRect.bottom>vvBottom-16||elRect.top<nvRect.top+4){
          const target=elRect.top-nvRect.top+nv.scrollTop-8;
          nv.scrollTo({top:Math.max(0,target),behavior:'smooth'});
        }
      } else {
        el.scrollIntoView({behavior:'smooth',block:'nearest'});
      }
    },150);
  }
  // iOS: キーボードアニメーション（約300ms）完了後に再計算してレイアウトを確定
  // resize は途中値で発火することがあるため、350ms後に再度補正する
  clearTimeout(_kbResizeTimer);
  _kbResizeTimer=setTimeout(()=>{
    const _ka=document.activeElement;
    const _kaIsInput=_ka&&(_ka.tagName==='INPUT'||_ka.tagName==='TEXTAREA');
    // ── Android fold 対応 ──────────────────────────
    // キーボードが閉じたのに入力フォーカスが残っている場合（foldでfocusoutが来ない）:
    // ① focusin で非表示にした時計を復元（hh=250 に戻す）
    // ② 編集フォームを先頭に戻す（nvST リセット）
    if(_kaIsInput&&_kbLastWasClose){
      const clk=document.querySelector('.header-clock');
      if(clk&&clk.style.display==='none') clk.style.display='';
      // 編集モードでフォームが画面外に出ていたら先頭へスクロール
      if(typeof isEdit!=='undefined'&&isEdit&&typeof editingId!=='undefined'&&editingId!==null){
        const _nv=document.getElementById('normal-view');
        if(_nv&&_nv.scrollTop>200) _nv.scrollTop=0; // 同期スクロール
      }
    }
    _kbLastWasClose=false; // settle後にリセット（次の fold 判定に備える）
    // ──────────────────────────────────────────────
    _dbgLog('kb:settle_before',()=>({..._dbgVpSnap(),willReset:!_kaIsInput}));
    if(!_kaIsInput) _resetWindowScroll();
    _updateStickyTops();
    _dbgLog('kb:settle_after',_dbgVpSnap);
  },350);
});
// iOS Safari: キーボード表示時にvisualViewportがスクロールするケースも補捉
// デバウンス(50ms)して連打を防ぐ（アニメーション中はここで window.scrollTo を呼ばない）
let _vpScrollTimer=null;
window.visualViewport?.addEventListener('scroll',()=>{
  clearTimeout(_vpScrollTimer);
  _vpScrollTimer=setTimeout(_updateStickyTops,50);
});
// focusin: 時計を非表示にしてヘッダー高さを約150px削減 → normal-view 表示領域を確保
document.addEventListener('focusin',e=>{
  const el=e.target;
  if((el.tagName==='INPUT'||el.tagName==='TEXTAREA')&&!el.closest('[id$="-overlay"]')){
    _dbgLog('kb:focusin',()=>({el:el.tagName+(el.id?'#'+el.id:''),..._dbgVpSnap()}));
    const clk=document.querySelector('.header-clock');
    if(clk) clk.style.display='none';
    requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));
  }
},true);
// focusout: フォーカスが外れたら時計を復元
document.addEventListener('focusout',e=>{
  // 即時: どの要素からフォーカスが外れたかを記録
  _dbgLog('kb:focusout',()=>({
    from:e.target?(e.target.tagName+(e.target.id?'#'+e.target.id:'')):'-',
    ..._dbgVpSnap(),
  }));
  // iOS: キーボードアニメーション（~300ms）完了を待ってから処理する
  setTimeout(()=>{
    const a=document.activeElement;
    const aIsInput=a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA');
    if(!aIsInput){
      const clk=document.querySelector('.header-clock');
      if(clk) clk.style.display='';
      // iOS: キーボード消去後にwindow.scrollYが残ることがあるためリセット
      _resetWindowScroll();
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        _updateStickyTops();
        // 編集中にフォームが画面外（nvST > 200）に出ていたら即座に先頭へ戻す
        // scrollTo(instant)はAndroid Chromeで非同期になるケースがあるため scrollTop直接代入で確実に同期
        if(typeof isEdit!=='undefined'&&isEdit&&typeof editingId!=='undefined'&&editingId!==null){
          const _fonv=document.getElementById('normal-view');
          if(_fonv&&_fonv.scrollTop>200) _fonv.scrollTop=0;
        }
        _dbgLog('kb:focusout_settle',_dbgVpSnap);
      }));
    } else {
      _dbgLog('kb:focusout_refocused',()=>({newAct:a.tagName+(a.id?'#'+a.id:''),..._dbgVpSnap()}));
    }
  },350); // 200→350ms: iOSキーボードアニメーション完了を確実に待つ
},true);
// 時刻は15秒ごと更新（renderRide全再描画しない）
setInterval(()=>{
  updateClock();
  if(!isRide) return;
  // 発車カウントダウンのみ差し替え（全再描画なし）
  const flat=currentDayFlat();
  if(!flat.length) return;
  const rci=flat.findIndex(s=>s.id===manualCurrentId); // currentDayIdxOf→flatから直接検索
  const vs=flat[rideViewIdx];
  if(rideViewIdx!==rci||!vs?.dep) return;
  const dm2=toMin(vs.dep);if(dm2===null)return;
  const diff=dm2-nowMin(),abs=Math.abs(diff);
  const hh2=Math.floor(abs/60),mm2=abs%60;
  const val=hh2>0&&mm2>0?`${hh2}<span style="font-size:.75em">時間</span>${String(mm2).padStart(2,'0')}<span style="font-size:.75em">分</span>`:hh2>0?`${hh2}<span style="font-size:.75em">時間</span>`:`${mm2}<span style="font-size:.75em">分</span>`;
  let html='';
  if(diff>2) html=`<div id="ride-dep-cd" class="ride-dep-cd before"><span class="ride-dep-cd-val">${val}</span><span class="ride-dep-cd-unit">前</span></div>`;
  else if(diff>=-2) html=`<div id="ride-dep-cd" class="ride-dep-cd now"><span class="ride-dep-cd-val">出発</span></div>`;
  else html=`<div id="ride-dep-cd" class="ride-dep-cd after"><span class="ride-dep-cd-val">${val}</span><span class="ride-dep-cd-unit">超過</span></div>`;
  const cd=document.getElementById('ride-dep-cd');
  if(cd) cd.outerHTML=html;
},15000);
if(!isEdit&&!isRide){
  toggleEdit();
  if(_dataRestored) showInfoToast('✅ 前回の行程を復元しました',3000);
  else showInfoToast('📂 データの読み込みをしてください',4000);
}
else{_restoreDraftIfAny();}
// 縦向き固定（Android Chrome対応・iOS Safariは非対応のため無視）
screen.orientation?.lock('portrait').catch(()=>{});
