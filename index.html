<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>旅刻mk18</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<!-- 地図ピッカー用 Leaflet（地図で地点を選ぶ機能） -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Boku&family=Kaisei+HarunoUmi:wght@700&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="splash">
  <div style="display:flex;flex-direction:row;align-items:flex-start;gap:0">
    <div style="display:flex;flex-direction:column;align-items:center">
      <div id="splash-credit" class="splash-powered" style="font-size:clamp(13px,4vw,20px);letter-spacing:.35em"></div>
    </div>
    <div class="splash-line"></div>
    <div class="splash-sub">ツーリング行程支援ツール</div>
    <div style="width:20px"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
      <img class="splash-title-img" src="icons/splash-title.png?v=16" alt="旅刻">
            <div style="font-size:clamp(11px,3vw,15px);color:rgba(240,235,215,.75);letter-spacing:.22em;font-family:'BIZ UDPGothic',-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;font-weight:700;animation:splash-in .6s ease .65s both">mk18</div>
    </div>
    <div style="width:28px"></div>
    <div style="writing-mode:vertical-rl;text-orientation:mixed;font-family:'Yuji Boku','Kaisei HarunoUmi','Hiragino Mincho ProN','Yu Mincho',serif;color:rgba(235,230,215,.88);text-shadow:2px 2px 4px rgba(0,0,0,.95),0 0 20px rgba(0,0,0,.8);animation:splash-in .6s ease .7s both;position:relative;z-index:1;line-height:1.6">
      <span id="splash-episode" style="font-size:clamp(13px,3.8vw,18px);letter-spacing:.4em;opacity:.7"></span>
      <br>
      <span id="splash-ep-title" style="font-size:clamp(17px,5vw,26px);letter-spacing:.25em;font-weight:400"></span>
    </div>
  </div>
</div>

<header>
  <div class="header-main">
    <div class="header-left">
      <button id="menu-toggle-btn" onclick="toggleMenu()" title="メニュー" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <div id="gps-status" class="gps-status" aria-live="polite" role="button" tabindex="0" title="タップでGPS自動追跡を切替" onclick="toggleGps()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleGps();}"></div>
    </div>
    <div class="header-clock">
      <div class="led-wrap">
        <div id="now-display"></div>
      </div>
    </div>
    <div class="header-quick">
      <button id="ride-btn" onclick="toggleRide()" title="走行モード">🏍️</button>
      <button id="cancel-ride-btn" onclick="cancelToRide()" style="display:none" title="走行モードを終了">✖</button>
      <button id="edit-btn" onclick="onEditBtnClick()" title="編集">✏️</button>
    </div>
    <input type="file" id="load-file-input" accept=".json,application/json" style="display:none" onchange="onFileSelected(event)">
  </div>

  <div class="day-tabs" id="day-tabs"></div>
  <div class="day-manage" id="day-manage" style="display:none">
    <div class="day-manage-btns">
      <button onclick="addDay()">＋ 日程追加</button>
      <button onclick="deleteCurrentDay()" class="danger">🗑️ 削除</button>
    </div>
    <div class="day-inline-row">
      <input id="inp-day-date" type="date" oninput="saveDayDate()" style="flex:0 0 auto;width:140px">
      <input id="inp-route-url" type="text" maxlength="500" placeholder="🗺 ルートURL" oninput="_saveRouteDebounced()" style="flex:1;min-width:0">
    </div>
  </div>
</header>

  <!-- ハンバーガーメニュー（ドロワー） -->
  <div id="menu-overlay" onclick="closeMenu()"></div>
  <nav id="menu-drawer" aria-label="メニュー">
    <div class="menu-drawer-head">
      <span class="menu-drawer-title">🏍 メニュー</span>
      <button type="button" class="menu-drawer-close" onclick="closeMenu()" title="閉じる">✕</button>
    </div>
    <div class="menu-drawer-body">
      <div class="menu-section-label">データ</div>
      <button class="menu-item" id="json-save-btn" onclick="closeMenu();openSaveModal()">
        <span class="mi-icon">💾</span>
        <span class="mi-text"><span class="mi-label">保存</span><span class="mi-sub">データを保存する</span></span>
      </button>
      <button class="menu-item" onclick="closeMenu();openLoadModal()">
        <span class="mi-icon">📂</span>
        <span class="mi-text"><span class="mi-label">読込</span><span class="mi-sub">前回データを復元</span></span>
      </button>
      <button class="menu-item" onclick="closeMenu();shareItinerary()">
        <span class="mi-icon">📋</span>
        <span class="mi-text"><span class="mi-label">共有</span><span class="mi-sub">テキストをコピー</span></span>
      </button>
      <button class="menu-item" id="record-save-btn" onclick="closeMenu();saveRecord()">
        <span class="mi-icon">📝</span>
        <span class="mi-text"><span class="mi-label">走行記録として保存</span><span class="mi-sub">実績をログに残す</span></span>
      </button>

      <div class="menu-section-label">表示・設定</div>
      <button class="menu-item" onclick="_toggleTheme()">
        <span class="mi-icon" id="theme-icon">☀️</span>
        <span class="mi-text"><span class="mi-label">テーマ切替</span><span class="mi-sub">昼/夜の配色を変更</span></span>
      </button>
      <button class="menu-item" id="fontsize-btn" onclick="_cycleFontSize()">
        <span class="mi-icon">🔠</span>
        <span class="mi-text"><span class="mi-label">文字サイズ</span><span class="mi-sub" id="fontsize-sub">標準</span></span>
      </button>
      <button class="menu-item" onclick="closeMenu();openSplashSettings()">
        <span class="mi-icon">📜</span>
        <span class="mi-text"><span class="mi-label">タイトル設定</span><span class="mi-sub">表示名・サブタイトル</span></span>
      </button>

      <div class="menu-section-label">ツール</div>
      <button class="menu-item" id="gps-btn" onclick="closeMenu();toggleGps()">
        <span class="mi-icon">📡</span>
        <span class="mi-text"><span class="mi-label">GPS自動追跡</span><span class="mi-sub">現在地で自動切替</span></span>
      </button>
      <button class="menu-item" onclick="closeMenu();window.open('tabidoki_manual.html','_blank','noopener')">
        <span class="mi-icon">📖</span>
        <span class="mi-text"><span class="mi-label">使い方・マニュアル</span><span class="mi-sub">操作の説明を開く</span></span>
      </button>
      <button class="menu-item" onclick="closeMenu();loadSampleData()">
        <span class="mi-icon">🗺️</span>
        <span class="mi-text"><span class="mi-label">サンプルを読み込む</span><span class="mi-sub">お試し行程を表示</span></span>
      </button>
    </div>
  </nav>

<main>
<div id="normal-view">
  <div id="edit-area" style="display:none">
    <div class="edit-panel">
      <div class="edit-panel-head">
        <span>🏍 ツーリング名</span>
      </div>
      <div class="form-gap">
        <input id="inp-title" type="text" maxlength="60" placeholder="例：紅葉の道志みちツーリング" autocomplete="off" autocapitalize="off" oninput="_saveTitleDebounced()" onblur="_commitTitle()">
        <div style="font-size:15px;color:var(--text3);font-weight:600">保存時のファイル名・共有テキスト・走行記録に使われます</div>
      </div>
    </div>
    <div class="edit-panel">
      <div class="edit-panel-head">
        <span id="form-title">地点を追加</span>
        <button type="button" class="edit-close-btn" onclick="cancelEdit()" title="閉じる">✕</button>
      </div>
      <div class="form-gap">
        <input id="inp-name" type="text" maxlength="50" placeholder="地点名（例：道の駅みつまた）">
        <div class="picker-chips">
          <button type="button" class="picker-chip ch-hw" onclick="openHighway()">🛣 高速</button>
          <button type="button" class="picker-chip ch-mn" onclick="openMichinoEki()">🏪 道の駅</button>
          <button type="button" class="picker-chip ch-gs" onclick="openGasStation()">⛽ GS</button>
          <button type="button" class="picker-chip ch-kk" onclick="openKaikatsu()">🏨 快活</button>
        </div>
        <div class="time-inline-row">
          <div class="time-inline-item">
            <span class="time-inline-label">着</span>
            <input id="inp-arr" type="time" oninput="checkTimeOrder()">
          </div>
          <span class="time-inline-arrow">↓</span>
          <div class="time-inline-item">
            <span class="time-inline-label">発</span>
            <input id="inp-dep" type="time" oninput="checkTimeOrder()">
          </div>
        </div>
        <div id="stay-dur-preview" style="font-size:16px;color:var(--text3);font-weight:600;text-align:right;display:none;margin-top:-4px"></div>
        <div id="time-order-error" style="display:none;font-size:16px;color:var(--red);margin-top:-4px">⚠ 出発時刻は到着時刻より後にしてください</div>
        <textarea id="inp-note" maxlength="1000" rows="6" placeholder="メモ（食事・注意点など）" style="display:none"></textarea>
        <div id="note-preview" class="is-empty" role="button" tabindex="0" onclick="openNoteModal()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openNoteModal()}"></div>
        <input id="inp-log" type="text" maxlength="200" placeholder="📝 走行メモ" style="display:none">
        <div id="log-preview" class="is-empty" role="button" tabindex="0" onclick="openLogModal()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openLogModal()}"></div>
        <button type="button" class="details-toggle" id="details-toggle" onclick="toggleDetails()">
          <span class="details-toggle-arrow">▼</span>
          <span>詳細（住所・給油・実績）</span>
        </button>
        <div class="details-body" id="details-body" style="display:none">
          <input id="inp-addr" type="text" maxlength="100" placeholder="住所 または 座標（緯度, 経度）・任意" oninput="_updateGeoHint()">
          <div class="geo-field-row">
            <button type="button" class="geo-capture-btn" id="geo-capture-btn" onclick="captureCurrentLocation()">📍 現在地</button>
            <button type="button" class="geo-map-btn" id="geo-map-btn" onclick="openLocationPicker()">🗺 地図で選ぶ</button>
            <span class="geo-hint" id="geo-hint"></span>
          </div>
          <div class="fuel-check-row" onclick="toggleFuelCheck()">
            <div class="fuel-check-box" id="fuel-check-box"></div>
            <span class="fuel-check-label">⛽ 給油ポイント</span>
          </div>
          <div style="font-size:16px;color:rgba(77,166,255,.9);font-weight:700;margin-top:4px;letter-spacing:.04em">実績時刻</div>
          <div class="time-inline-row">
            <div class="time-inline-item">
              <span class="time-inline-label" style="color:rgba(77,166,255,.9)">実着</span>
              <input id="inp-act-arr" type="time" style="border-color:rgba(77,166,255,.45)">
            </div>
            <span class="time-inline-arrow">↓</span>
            <div class="time-inline-item">
              <span class="time-inline-label" style="color:rgba(77,166,255,.9)">実発</span>
              <input id="inp-act-dep" type="time" style="border-color:rgba(77,166,255,.45)">
            </div>
          </div>
        </div>
        <div class="cascade-hint" id="cascade-hint">⏱ 出発時刻を変えると以降の地点が自動でずれます</div>
        <button class="primary" id="save-btn" onclick="saveStop()" style="width:100%;justify-content:center;font-size:17px;padding:14px">＋ 追加</button>
      </div>
    </div>
    <div class="drag-hint" id="drag-hint">地点を長押しドラッグして行程を並び替え</div>
  </div>

  <div class="timeline" id="timeline"></div>
  <div class="empty-state" id="empty-state" style="display:none">
    <div style="font-size:48px;opacity:.4;margin-bottom:12px">🗺️</div>
    <div style="font-size:14px">「編集」から地点を追加してください</div>
  </div>
</div>

<div id="ride-view">
  <div id="ride-content-wrap">
    <div id="ride-provisional-banner"></div>
    <div id="ride-content"></div>
  </div>
  <div class="ride-swipe-bar" id="ride-swipe-bar" style="display:none">
    <span class="ride-swipe-arr" id="sw-arr-l" onclick="rideNavigate(-1)">◀ 前</span>
    <span class="ride-stop-ctr" id="ride-stop-ctr"></span>
    <span class="ride-swipe-arr" id="sw-arr-r" onclick="rideNavigate(1)">次 ▶</span>
  </div>
</div>
</main>

<div id="note-modal" style="display:none">
  <div class="nm-head">
    <span class="nm-title">📝 メモ</span>
    <button type="button" class="nm-close" onclick="closeNoteModal(false)" title="破棄して閉じる">✕</button>
    <button type="button" class="nm-done" onclick="closeNoteModal(true)">完了</button>
  </div>
  <textarea id="note-modal-text" maxlength="1000" placeholder="メモ（食事・注意点など）"></textarea>
  <div class="nm-count" id="note-modal-count">0 / 1000</div>
</div>

<div id="log-modal" style="display:none">
  <div class="nm-head">
    <span class="nm-title">📝 走行メモ</span>
    <button type="button" class="nm-close" onclick="closeLogModal(false)" title="破棄して閉じる">✕</button>
    <button type="button" class="nm-done" onclick="closeLogModal(true)">完了</button>
  </div>
  <textarea id="log-modal-text" maxlength="200" placeholder="📝 走行メモ" onkeydown="if(event.key==='Enter'){event.preventDefault();}"></textarea>
  <div class="nm-count" id="log-modal-count">0 / 200</div>
</div>

<div id="app-error-toast">
  <button id="app-err-dismiss" onclick="dismissAppError()">✕</button>
  <div class="app-err-code" id="app-err-code">E-GL01</div>
  <div class="app-err-msg" id="app-err-msg"></div>
</div>
<div id="info-toast" style="display:none;position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:10002;width:calc(100% - 28px);max-width:440px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;padding:14px 18px;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:toast-in .22s cubic-bezier(.2,0,.2,1);text-align:center;font-size:15px;font-weight:700;color:var(--text)">
</div>
<div id="dbg-badge" onclick="openSplashSettings()" title="デバッグログ"><span id="dbg-badge-text">🐛</span></div>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script>
<!-- 起動ロックを無効化：本体(js/13-init.js)を直接起動する -->
<script type="module" src="js/13-init.js"></script>
<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "2f2d3229bba14f57a519f1e1c46d71c3"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
