    </div>
    <div style="padding:8px 14px 6px;font-size:12px;color:var(--text3);flex-shrink:0">選択すると給油ポイントが自動でONになります</div>
    <div id="gs-list" style="overflow-y:auto;flex:1;padding:4px 0 8px;-webkit-overflow-scrolling:touch"></div>
  </div>`;
  document.body.appendChild(ov);
  _bindOverlayVp(ov,applyVp);
  const closeBtn=document.getElementById('gs-close-btn');
  if(closeBtn) closeBtn.onclick=()=>{
    _unbindOverlayVp(applyVp);
    document.getElementById('gs-overlay')?.remove();
    requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));
  };
  const _q=(document.getElementById('inp-name')?.value||'').trim();
  const _s=ov.querySelector('#gs-search');
  if(_s&&_q) _s.value=_q;
  renderGasStationList(_q);
  setTimeout(()=>{const el=document.getElementById('gs-search');if(el){el.focus();if(_q) el.select();}},100);
}
function filterGasStation(){
  renderGasStationList((document.getElementById('gs-search')?.value||'').trim());
}
function renderGasStationList(q){
  const list=document.getElementById('gs-list');
  if(!list) return;
  const filtered=q?GAS_STATION_CHAINS.filter(g=>g[0].includes(q)||g[1].includes(q)):GAS_STATION_CHAINS;
  if(!filtered.length){list.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3);font-size:14px">見つかりません</div>';return;}
  list.innerHTML=filtered.map(g=>`<div onclick="selectGasStation('${escJsAttr(g[0])}')" style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer">
    <div style="font-weight:700;font-size:15px;color:var(--text)">⛽ ${esc(g[0])}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(g[1])}</div>
  </div>`).join('');
}
function selectGasStation(chain){
  _dbgLog('selectGasStation',{chain});
  const ni=document.getElementById('inp-name');
  if(ni) ni.value=chain+' SS';
  _setFuelCheck(true);
  _closeOverlay('gs-overlay'); // visualViewport リスナーリーク防止
  document.activeElement?.blur(); // キーボードを閉じる
  setTimeout(()=>{
    document.getElementById('normal-view')?.scrollTo({top:0,behavior:'instant'});
  },50);
}

syncBorderAddr();save();
initRideSwipe();
initNormalSwipe();
renderTabs();
updateClock();
render();
// レイアウト確定後にheight計算
requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));
// スプラッシュ画面のエピソード・タイトルを描画
_renderSplash();
// ── キーボード表示対応 ──────────────────────────────
// visualViewport resize: sticky高さ再計算 + edit-area先頭をnormal-view上端に揃える
(window.visualViewport||window).addEventListener('resize',()=>{
  _updateStickyTops();
  const el=document.activeElement;
  const nv=document.getElementById('normal-view');
  if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')&&!el.closest('[id$="-overlay"]')){
    setTimeout(()=>{
      const ea=document.getElementById('edit-area');
      if(nv&&ea){
        const target=ea.getBoundingClientRect().top - nv.getBoundingClientRect().top + nv.scrollTop - 8;
        nv.scrollTo({top:Math.max(0,target),behavior:'smooth'});
      } else {
        el.scrollIntoView({behavior:'smooth',block:'start'});
      }
    },150);
  }
});
// focusin: 時計を非表示にしてヘッダー高さを約150px削減 → normal-view 表示領域を確保
document.addEventListener('focusin',e=>{
  const el=e.target;
  if((el.tagName==='INPUT'||el.tagName==='TEXTAREA')&&!el.closest('[id$="-overlay"]')){
    const clk=document.querySelector('.header-clock');
    if(clk) clk.style.display='none';
    requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));
  }
},true);
// focusout: フォーカスが外れたら時計を復元
document.addEventListener('focusout',()=>{
  setTimeout(()=>{
    const a=document.activeElement;
    if(!a||a.tagName!=='INPUT'&&a.tagName!=='TEXTAREA'){
      const clk=document.querySelector('.header-clock');
      if(clk) clk.style.display='';
      requestAnimationFrame(()=>requestAnimationFrame(_updateStickyTops));
    }
  },200);
},true);
// 時刻は15秒ごと更新（renderRide全再描画しない）
setInterval(()=>{
  updateClock();
  if(!isRide) return;
  // 発車カウントダウンのみ差し替え（全再描画なし）
  const flat=currentDayFlat();
  if(!flat.length) return;
  const rci=flat.findIndex(s=>s.id===manualCurrentId); // currentDayIdxOf→flatから直接検索
  const vs=flat[rideViewIdx];
  if(rideViewIdx!==rci||!vs?.dep) return;
  const dm2=toMin(vs.dep);if(dm2===null)return;
  const diff=dm2-nowMin(),abs=Math.abs(diff);
  const hh2=Math.floor(abs/60),mm2=abs%60;
  const val=hh2>0?`${hh2}<span style="font-size:.75em">時間</span>${String(mm2).padStart(2,'0')}<span style="font-size:.75em">分</span>`:`${mm2}<span style="font-size:.75em">分</span>`;
  let html='';
  if(diff>2) html=`<div class="ride-dep-cd before"><span class="ride-dep-cd-val">${val}</span><span class="ride-dep-cd-unit">前</span></div>`;
  else if(diff>=-2) html=`<div class="ride-dep-cd now"><span class="ride-dep-cd-val">出発</span></div>`;
  else html=`<div class="ride-dep-cd after"><span class="ride-dep-cd-val">${val}</span><span class="ride-dep-cd-unit">超過</span></div>`;
  const cd=document.querySelector('.ride-dep-cd');
  if(cd) cd.outerHTML=html;
},15000);
if(!isEdit&&!isRide){toggleEdit();showInfoToast('📂 データの読み込みをしてください',4000);}
// 縦向き固定（Android Chrome対応・iOS Safariは非対応のため無視）
screen.orientation?.lock('portrait').catch(()=>{});
</script>
</body>
</html>
